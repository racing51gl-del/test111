<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slamdunk51's Hiking Log</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-pA6P/FNpeVSSuFFIzeOCmbPhrCq4CBoCBSSzUllKKl4=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Slamdunk51's Hiking Log</h1>
        <button id="theme-toggle">다크모드</button>
    </header>

    <main>
        <section id="map-container">
            <div id="map"></div>
        </section>

        <section id="analysis">
            <h2>요약</h2>
            <div id="summary"></div>
        </section>
        
        <section id="hiking-log">
            <h2>등산 기록</h2>
            <div id="log-container"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="main.js"></script>
</body>
</html>
